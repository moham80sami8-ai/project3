function calculateSupply(age, amount_per_day) 
{
  var maxAge = 100;
  var remainingYears = maxAge - age;
  var result = remainingYears * 365 * amount_per_day;

  document.write("You will need " + result + " cups of tea to last you until the ripe old age of " + maxAge + "<br>");
}
calculateSupply(30, 3);

 {
